name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Supabase Edge Functions and tests
        run: |
          deno check \
            supabase/functions/ingest-tournaments/index.ts \
            supabase/functions/ingest-tournament-decks/index.ts \
            supabase/functions/process-tournament-ingestion/index.ts \
            supabase/functions/tournament-decklist/index.ts \
            supabase/functions/ingest-tournaments/location.test.ts \
            supabase/functions/ingest-tournaments/topdeck.test.ts \
            supabase/functions/ingest-tournaments/tournamentRelevance.test.ts \
            supabase/functions/ingest-tournament-decks/normalizer.test.ts

      - name: Lint source
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
        env:
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
          VITE_APP_TAGLINE: ${{ vars.VITE_APP_TAGLINE }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
